
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Álbum Real de Valentina</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --oro: #d4af37;
            --rosa-fuerte: #ff007f;
            --texto: #5a4a42;
            --fondo-gradiente: linear-gradient(-45deg, #fef1f8, #fdf2f5, #ffe4f0, #ffffff);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: #fef1f8;
            color: var(--texto);
            text-align: center;
            overflow-x: hidden;
        }

        /* BARRA DE ADMIN */
        #adminBar {
            display: none;
            background: var(--texto);
            color: white;
            padding: 12px;
            font-size: 0.8rem;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: 3px solid var(--oro);
        }

        /* PORTADA LLAMATIVA CON ANIMACIÓN */
        .header-album {
            background: var(--fondo-gradiente);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 60px 20px;
            border-bottom: 5px double var(--oro);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .foto-portada {
            width: 180px; height: 180px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 6px solid white;
            outline: 3px solid var(--oro);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(255, 0, 127, 0.2);
            cursor: pointer;
        }
        .foto-portada img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--oro); margin: 10px 0; text-shadow: 2px 2px 0px white; }

        /* SECCIÓN DE STICKERS (NUEVA) */
        .muro-recuerdos {
            background: white;
            margin: 30px 15px;
            padding: 30px 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .color-picker {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .dot {
            width: 40px; height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .dot:hover { transform: scale(1.2); }

        .sticker-input-area {
            background: #fff4ad;
            padding: 20px;
            border-radius: 10px;
            max-width: 350px;
            margin: 0 auto;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }

        .sticker-input-area input, .sticker-input-area textarea {
            width: 100%; border: none; background: transparent;
            font-family: 'Montserrat'; color: #444;
        }
        .sticker-input-area textarea { height: 70px; resize: none; margin-top: 10px; }

        .btn-enviar-sticker {
            background: var(--texto);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        #muro-mensajes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding: 20px 10px;
        }

        .post-it {
            width: 150px;
            min-height: 150px;
            padding: 15px;
            text-align: left;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            font-size: 0.85rem;
            position: relative;
        }

        /* GALERÍA */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; padding: 15px; margin-bottom: 120px;
        }
        .photo-item { aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        .btn-magic-upload {
            background: var(--rosa-fuerte);
            color: white; border: 3px solid white;
            padding: 18px 35px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 10px 25px rgba(255, 0, 127, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="adminBar">
        <span>👑 PANEL ADMIN</span>
        <button onclick="descargarTodo()" style="background:var(--oro); color:white; border:none; padding:5px 10px; border-radius:5px;">ZIP</button>
    </div>

    <div class="header-album">
        <div class="foto-portada" onclick="trucoSecreto()">
            <img src="https://www.dropbox.com/scl/fi/nm44i882g13044o8idz6k/xv1.jpg?rlkey=wn8xf4ne3yp5fz4vkzpsvbz4p&raw=1" alt="Valentina">
        </div>
        <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; color: var(--rosa-fuerte); font-weight: bold;">Libro Mágico de</p>
        <h1>Valentina</h1>
    </div>

    <div class="muro-recuerdos">
        <h2 style="font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--texto);">Deja un Mensaje</h2>
        <p style="font-size: 0.7rem;">ESCOGE EL COLOR DE TU MENSAJE:</p>
        
        <div class="color-picker">
            <div class="dot" onclick="cambiarColorSticker('#fff4ad')" style="background:#fff4ad;"></div>
            <div class="dot" onclick="cambiarColorSticker('#ffcfdf')" style="background:#ffcfdf;"></div>
            <div class="dot" onclick="cambiarColorSticker('#cfefff')" style="background:#cfefff;"></div>
            <div class="dot" onclick="cambiarColorSticker('#d1ffcf')" style="background:#d1ffcf;"></div>
        </div>

        <div class="sticker-input-area" id="caja-sticker">
            <input type="text" id="nombre-invitado" placeholder="Tu nombre...">
            <textarea id="texto-invitado" placeholder="Escribe tus deseos aquí..."></textarea>
            <button class="btn-enviar-sticker" onclick="publicarMensaje()">PUBLICAR</button>
        </div>

        <div id="muro-mensajes"></div>
    </div>

    <h2 style="font-family: 'Great Vibes'; font-size: 2.5rem; margin-top: 50px;">Galería de Fotos</h2>
    <div id="status-msg">Cargando fotos reales...</div>
    <div class="gallery-grid" id="galleryContainer"></div>

    <div style="position: fixed; bottom: 30px; width: 100%; z-index: 1500;">
        <button id="upload_widget" class="btn-magic-upload">📸 SUBIR FOTO</button>
    </div>

    <script>
        const cloudName = "dkoaxjahe"; 
        const uploadPreset = "ALBUN TEST"; 
        const eventTag = "cumple_valentina_6";
        let colorActual = "#fff4ad";

        function cambiarColorSticker(color) {
            colorActual = color;
            document.getElementById('caja-sticker').style.backgroundColor = color;
        }

        function publicarMensaje() {
            const nom = document.getElementById('nombre-invitado').value;
            const msg = document.getElementById('texto-invitado').value;
            if(!nom || !msg) return alert("Escribe tu nombre y mensaje");

            const muro = document.getElementById('muro-mensajes');
            const postit = document.createElement('div');
            postit.className = "post-it";
            postit.style.backgroundColor = colorActual;
            // Rotación aleatoria para estilo llamativo
            const rot = Math.floor(Math.random() * 10) - 5;
            postit.style.transform = `rotate(${rot}deg)`;
            
            postit.innerHTML = `<strong>De: ${nom}</strong><p>${msg}</p>`;
            muro.prepend(postit);

            document.getElementById('nombre-invitado').value = "";
            document.getElementById('texto-invitado').value = "";
        }

        // --- LOGICA CLOUDINARY ---
        async function cargarGaleria() {
            const grid = document.getElementById('galleryContainer');
            const url = `https://res.cloudinary.com/${cloudName}/image/list/${eventTag}.json`;
            try {
                const res = await fetch(url + "?t=" + new Date().getTime());
                const data = await res.json();
                if (data.resources) {
                    document.getElementById('status-msg').style.display = 'none';
                    grid.innerHTML = '';
                    data.resources.forEach(img => {
                        const item = document.createElement('div');
                        item.className = 'photo-item';
                        const src = `https://res.cloudinary.com/${cloudName}/image/upload/w_400,c_fill,g_auto/${img.public_id}.${img.format}`;
                        item.innerHTML = `<img src="${src}" onclick="window.open('https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}')">`;
                        grid.appendChild(item);
                    });
                }
            } catch (e) { console.log("Aún no hay fotos"); }
        }

        const myWidget = cloudinary.createUploadWidget({
            cloudName: cloudName, uploadPreset: uploadPreset, tags: [eventTag], theme: "minimal"
        }, (err, res) => { if (!err && res.event === "success") setTimeout(cargarGaleria, 1500); });

        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

        function trucoSecreto() {
            if (++contadorClics === 3) {
                if (prompt("Clave:") === "1234") document.getElementById('adminBar').style.display = 'flex';
                contadorClics = 0;
            }
        }
        let contadorClics = 0;
        window.onload = cargarGaleria;
    </script>
</body>
</html>
